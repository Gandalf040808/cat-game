<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端猫咪陪伴系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f8ff, #fff0f5);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            padding: 25px 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .login-section {
            background: #fffaf0;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        
        .login-form {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #6a11cb;
        }
        
        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin: 10px 0;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .dashboard {
            display: none;
            padding: 20px;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .sidebar {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .main-content {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .panel-title {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .cat-profile {
            background: linear-gradient(135deg, #ffebee, #e8f5e9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .avatar-upload {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffccbc;
            margin: 0 auto 15px;
            overflow: hidden;
            cursor: pointer;
            background: #fff;
        }
        
        .avatar-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .avatar-upload .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 40px;
            color: #ccc;
        }
        
        .cat-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .stat-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #6a11cb;
        }
        
        .stat-label {
            font-size: 0.8em;
            color: #666;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-call {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }
        
        .btn-travel {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        
        .btn-chat {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
        }
        
        .btn-gift {
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
        }
        
        .content-area {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            min-height: 400px;
        }
        
        .content-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
        }
        
        .content-placeholder img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #6a11cb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .chat-interface {
            display: flex;
            flex-direction: column;
            height: 400px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
        }
        
        .user-message {
            background: #e3f2fd;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .cat-message {
            background: #f1f8e9;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        
        .input-area button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #6a11cb;
            color: white;
            cursor: pointer;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s, fadeOut 0.5s 2.5s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        .hidden {
            display: none !important;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .service-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐱 云端猫咪陪伴系统</h1>
            <div class="subtitle">随时随地与您的爱猫连接</div>
        </header>
        
        <div class="login-section" id="login-section">
            <div class="login-form">
                <h2>登录您的服务账户</h2>
                <p style="color: #666; margin: 15px 0;">使用您的OpenAI或其他AI服务账户登录</p>
                
                <div class="form-group">
                    <label for="api-key">服务API密钥</label>
                    <input type="password" id="api-key" placeholder="请输入您的API密钥">
                </div>
                
                <div class="form-group">
                    <label for="service-type">服务提供商</label>
                    <select id="service-type">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic Claude</option>
                        <option value="google">Google Gemini</option>
                        <option value="azure">Azure OpenAI</option>
                    </select>
                </div>
                
                <button class="btn btn-primary" id="login-btn">登录并连接</button>
                
                <div class="service-info">
                    <strong>注意：</strong>您需要拥有相应的AI服务账户才能使用此功能。
                    本系统不会存储您的API密钥，所有请求都从您的浏览器直接发送到服务商。
                </div>
            </div>
        </div>
        
        <div class="dashboard" id="dashboard">
            <div class="main-layout">
                <div class="sidebar">
                    <h2 class="panel-title">猫咪档案</h2>
                    <div class="cat-profile">
                        <div class="avatar-upload" id="avatar-upload">
                            <div class="placeholder">😺</div>
                            <img id="cat-image" class="hidden" alt="猫咪头像">
                        </div>
                        <div class="cat-name" id="cat-name">我的猫咪</div>
                        <input type="file" id="image-upload" accept="image/*">
                        
                        <button class="btn btn-secondary" onclick="document.getElementById('image-upload').click()">
                            更换照片
                        </button>
                        
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-value" id="mood-value">85%</div>
                                <div class="stat-label">开心度</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="energy-value">78%</div>
                                <div class="stat-label">精力</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="trips-value">3</div>
                                <div class="stat-label">旅行次数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="last-seen">2分钟前</div>
                                <div class="stat-label">最后活动</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn-action btn-call" id="call-btn">
                            📞 视频通话
                        </button>
                        <button class="btn-action btn-travel" id="travel-btn">
                            ✈️ 安排旅行
                        </button>
                        <button class="btn-action btn-chat" id="chat-btn">
                            💬 开始聊天
                        </button>
                        <button class="btn-action btn-gift" id="gift-btn">
                            🎁 寄送礼物
                        </button>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 10px;">
                        <h3>服务状态</h3>
                        <p style="color: #2e7d32; margin: 10px 0;">✅ 已连接到您的AI服务</p>
                        <p style="color: #666; font-size: 0.9em;">API调用正常，响应时间良好</p>
                    </div>
                </div>
                
                <div class="main-content">
                    <h2 class="panel-title" id="content-title">等待操作</h2>
                    <div class="content-area" id="content-area">
                        <div class="content-placeholder">
                            <div>🐱 请从左侧选择操作</div>
                            <div style="margin-top: 10px; color: #666; font-size: 0.9em;">
                                连接您的AI服务后，即可与猫咪互动
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification">操作成功！</div>

    <script>
        // 系统状态
        const systemState = {
            isLoggedIn: false,
            apiKey: '',
            serviceType: 'openai',
            currentView: 'home',
            isCalling: false,
            isTraveling: false,
            mood: 85,
            energy: 78,
            tripCount: 3,
            chatHistory: []
        };
        
        // DOM元素
        const elements = {
            loginSection: document.getElementById('login-section'),
            dashboard: document.getElementById('dashboard'),
            apiKey: document.getElementById('api-key'),
            serviceType: document.getElementById('service-type'),
            loginBtn: document.getElementById('login-btn'),
            avatarUpload: document.getElementById('avatar-upload'),
            catImage: document.getElementById('cat-image'),
            imageUpload: document.getElementById('image-upload'),
            catName: document.getElementById('cat-name'),
            moodValue: document.getElementById('mood-value'),
            energyValue: document.getElementById('energy-value'),
            tripsValue: document.getElementById('trips-value'),
            lastSeen: document.getElementById('last-seen'),
            callBtn: document.getElementById('call-btn'),
            travelBtn: document.getElementById('travel-btn'),
            chatBtn: document.getElementById('chat-btn'),
            giftBtn: document.getElementById('gift-btn'),
            contentTitle: document.getElementById('content-title'),
            contentArea: document.getElementById('content-area'),
            notification: document.getElementById('notification')
        };
        
        // 事件监听器
        elements.loginBtn.addEventListener('click', login);
        elements.imageUpload.addEventListener('change', handleImageUpload);
        elements.avatarUpload.addEventListener('click', () => elements.imageUpload.click());
        elements.callBtn.addEventListener('click', startVideoCall);
        elements.travelBtn.addEventListener('click', arrangeTravel);
        elements.chatBtn.addEventListener('click', startChat);
        elements.giftBtn.addEventListener('click', sendGift);
        
        // 登录功能
        function login() {
            const apiKey = elements.apiKey.value.trim();
            const serviceType = elements.serviceType.value;
            
            if (!apiKey) {
                showNotification('请输入API密钥');
                return;
            }
            
            // 模拟API连接测试
            systemState.apiKey = apiKey;
            systemState.serviceType = serviceType;
            systemState.isLoggedIn = true;
            
            // 保存到localStorage
            localStorage.setItem('catCompanionApiKey', apiKey);
            localStorage.setItem('catCompanionServiceType', serviceType);
            
            // 显示主界面
            elements.loginSection.classList.add('hidden');
            elements.dashboard.classList.remove('hidden');
            
            showNotification('登录成功！已连接到您的服务');
        }
        
        // 处理图片上传
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    elements.catImage.src = e.target.result;
                    elements.catImage.classList.remove('hidden');
                    document.querySelector('.avatar-upload .placeholder').style.display = 'none';
                    showNotification('猫咪照片已更新');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // 开始视频通话
        function startVideoCall() {
            if (!systemState.isLoggedIn) {
                showNotification('请先登录');
                return;
            }
            
            systemState.currentView = 'calling';
            elements.contentTitle.textContent = '视频通话';
            
            elements.contentArea.innerHTML = `
                <div class="content-placeholder">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>正在连接视频通话...</div>
                        <div style="font-size: 0.9em; color: #666; margin-top: 10px;">
                            通过您的AI服务建立视频连接
                        </div>
                    </div>
                </div>
            `;
            
            // 模拟API调用延迟
            setTimeout(() => {
                elements.contentArea.innerHTML = `
                    <div class="content-placeholder">
                        <img src="https://placehold.co/600x400/4A90E2/FFFFFF?text=🐱+视频通话中" alt="视频通话">
                        <div style="margin-top: 15px;">
                            <h3>与猫咪视频通话中</h3>
                            <p>语音和视频功能由您的AI服务提供支持</p>
                        </div>
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="endVideoCall()">
                            结束通话
                        </button>
                    </div>
                `;
                
                // 更新猫咪状态
                systemState.mood = Math.min(100, system.mood + 5);
                updateStats();
            }, 2000);
        }
        
        // 结束视频通话
        function endVideoCall() {
            systemState.currentView = 'home';
            elements.contentTitle.textContent = '等待操作';
            
            elements.contentArea.innerHTML = `
                <div class="content-placeholder">
                    <div>🐱 通话已结束</div>
                    <div style="margin-top: 10px; color: #666; font-size: 0.9em;">
                        猫咪看起来很开心！
                    </div>
                </div>
            `;
            
            showNotification('视频通话结束');
        }
        
        // 安排旅行
        function arrangeTravel() {
            if (!systemState.isLoggedIn) {
                showNotification('请先登录');
                return;
            }
            
            systemState.currentView = 'traveling';
            elements.contentTitle.textContent = '旅行安排';
            
            elements.contentArea.innerHTML = `
                <div class="content-placeholder">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>正在规划旅行路线...</div>
                        <div style="font-size: 0.9em; color: #666; margin-top: 10px;">
                            通过您的AI服务生成旅行计划
                        </div>
                    </div>
                </div>
            `;
            
            // 模拟API调用延迟
            setTimeout(() => {
                const destinations = [
                    { name: '北京', desc: '参观故宫和长城', emoji: '🏛️' },
                    { name: '上海', desc: '游览外滩和迪士尼', emoji: '🏙️' },
                    { name: '成都', desc: '品尝美食和看熊猫', emoji: '🐼' },
                    { name: '西安', desc: '兵马俑和古城墙', emoji: '🏯' },
                    { name: '杭州', desc: '西湖美景', emoji: '🌸' }
                ];
                
                const randomDest = destinations[Math.floor(Math.random() * destinations.length)];
                
                elements.contentArea.innerHTML = `
                    <div class="content-placeholder">
                        <img src="https://placehold.co/600x400/50C878/FFFFFF?text=${encodeURIComponent(randomDest.emoji + ' ' + randomDest.name)}" alt="旅行目的地">
                        <div style="margin-top: 15px;">
                            <h3>旅行计划已安排</h3>
                            <p>目的地: ${randomDest.name}</p>
                            <p>活动: ${randomDest.desc}</p>
                        </div>
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="confirmTravel('${randomDest.name}')">
                            确认出发
                        </button>
                    </div>
                `;
            }, 2000);
        }
        
        // 确认旅行
        function confirmTravel(destination) {
            elements.contentArea.innerHTML = `
                <div class="content-placeholder">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>猫咪正在前往${destination}...</div>
                        <div style="font-size: 0.9em; color: #666; margin-top: 10px;">
                            生成旅行实时画面
                        </div>
                    </div>
                </div>
            `;
            
            // 模拟旅行过程
            setTimeout(() => {
                elements.contentArea.innerHTML = `
                    <div class="content-placeholder">
                        <img src="https://placehold.co/600x400/FF6B6B/FFFFFF?text=✈️+旅行中" alt="旅行中">
                        <div style="margin-top: 15px;">
                            <h3>猫咪在${destination}玩得很开心</h3>
                            <p>正在探索当地景点...</p>
                        </div>
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="finishTravel('${destination}')">
                            旅行结束
                        </button>
                    </div>
                `;
                
                // 更新状态
                systemState.isTraveling = true;
                systemState.tripCount++;
                updateStats();
            }, 3000);
        }
        
        // 完成旅行
        function finishTravel(destination) {
            elements.contentArea.innerHTML = `
                <div class="content-placeholder">
                    <img src="https://placehold.co/600x400/4A90E2/FFFFFF?text=🏠+回到家中" alt="回到家">
                    <div style="margin-top: 15px;">
                        <h3>旅行结束 - 安全到家</h3>
                        <p>猫咪从${destination}回来了！</p>
                        <p>带回了美好的回忆和纪念品</p>
                    </div>
                </div>
            `;
            
            systemState.isTraveling = false;
            systemState.mood = Math.min(100, systemState.mood + 10);
            updateStats();
            showNotification(`猫咪从${destination}旅行回来了！`);
        }
        
        // 开始聊天
        function startChat() {
            if (!systemState.isLoggedIn) {
                showNotification('请先登录');
                return;
            }
            
            systemState.currentView = 'chatting';
            elements.contentTitle.textContent = '与猫咪聊天';
            
            elements.contentArea.innerHTML = `
                <div class="chat-interface">
                    <div class="messages-area" id="messages-area">
                        <div class="message cat-message">
                            喵~ 主人你好！今天过得怎么样？
                        </div>
                    </div>
                    <div class="input-area">
                        <input type="text" id="message-input" placeholder="输入消息...">
                        <button id="send-message">发送</button>
                    </div>
                </div>
            `;
            
            // 添加发送消息事件
            document.getElementById('send-message').addEventListener('click', sendMessage);
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            const messagesArea = document.getElementById('messages-area');
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.textContent = message;
            messagesArea.appendChild(userMsg);
            
            input.value = '';
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            // 模拟AI回复
            setTimeout(() => {
                const responses = [
                    '喵呜~ 主人说得对！',
                    '咕噜咕噜~ 听起来很有趣呢！',
                    '呼噜呼噜~ 我也这么想！',
                    '嗷~ 真的吗？太好了！',
                    '汪呜~ 想你了！',
                    '喵~ 什么时候来看我呀？',
                    '咕噜~ 今天天气真好！'
                ];
                
                const response = responses[Math.floor(Math.random() * responses.length)];
                const catMsg = document.createElement('div');
                catMsg.className = 'message cat-message';
                catMsg.textContent = response;
                messagesArea.appendChild(catMsg);
                
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 1000);
        }
        
        // 寄送礼物
        function sendGift() {
            if (!systemState.isLoggedIn) {
                showNotification('请先登录');
                return;
            }
            
            systemState.currentView = 'gifting';
            elements.contentTitle.textContent = '寄送礼物';
            
            elements.contentArea.innerHTML = `
                <div class="content-placeholder">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>正在准备礼物...</div>
                        <div style="font-size: 0.9em; color: #666; margin-top: 10px;">
                            通过您的AI服务定制专属礼物
                        </div>
                    </div>
                </div>
            `;
            
            // 模拟API调用延迟
            setTimeout(() => {
                const gifts = [
                    { name: '小鱼干', emoji: '🐟', desc: '最爱的零食' },
                    { name: '猫薄荷玩具', emoji: '🎾', desc: '新奇的玩具' },
                    { name: '舒适猫窝', emoji: '🏠', desc: '温暖的小屋' },
                    { name: '激光笔', emoji: '🔴', desc: '追逐光点' },
                    { name: '毛线球', emoji: '🧶', desc: '经典玩具' }
                ];
                
                const randomGift = gifts[Math.floor(Math.random() * gifts.length)];
                
                elements.contentArea.innerHTML = `
                    <div class="content-placeholder">
                        <img src="https://placehold.co/200x200/FFD700/333333?text=${encodeURIComponent(randomGift.emoji)}" alt="礼物">
                        <div style="margin-top: 15px;">
                            <h3>礼物已寄出</h3>
                            <p>物品: ${randomGift.name}</p>
                            <p>描述: ${randomGift.desc}</p>
                        </div>
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="confirmGift('${randomGift.name}')">
                            确认送达
                        </button>
                    </div>
                `;
                
                // 更新猫咪状态
                systemState.mood = Math.min(100, systemState.mood + 8);
                updateStats();
            }, 2000);
        }
        
        // 确认礼物送达
        function confirmGift(giftName) {
            elements.contentArea.innerHTML = `
                <div class="content-placeholder">
                    <img src="https://placehold.co/600x400/4CAF50/FFFFFF?text=🎁+礼物送达" alt="礼物送达">
                    <div style="margin-top: 15px;">
                        <h3>礼物已送达</h3>
                        <p>猫咪收到${giftName}很开心！</p>
                        <p>开心度提升了</p>
                    </div>
                </div>
            `;
            
            showNotification(`猫咪收到了${giftName}，非常开心！`);
        }
        
        // 更新统计信息
        function updateStats() {
            elements.moodValue.textContent = systemState.mood + '%';
            elements.energyValue.textContent = systemState.energy + '%';
            elements.tripsValue.textContent = systemState.tripCount;
        }
        
        // 显示通知
        function showNotification(message) {
            elements.notification.textContent = message;
            elements.notification.style.display = 'block';
            
            setTimeout(() => {
                elements.notification.style.display = 'none';
            }, 3000);
        }
        
        // 初始化
        function init() {
            // 检查是否已有登录信息
            const savedApiKey = localStorage.getItem('catCompanionApiKey');
            const savedServiceType = localStorage.getItem('catCompanionServiceType');
            
            if (savedApiKey) {
                elements.apiKey.value = savedApiKey;
                if (savedServiceType) {
                    elements.serviceType.value = savedServiceType;
                }
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
